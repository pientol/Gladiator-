<div id="mojModal" class="modal">
    <span class="zamknij" onclick="zamknijModal()">&times;</span>
    
    <div class="nawigacja-kontener">
        <span class="strzalka lewa" onclick="zmienZdjecie(-1); event.stopPropagation();">&#10094;</span>
        
        <img class="modal-content" id="imgFull">
        
        <span class="strzalka prawa" onclick="zmienZdjecie(1); event.stopPropagation();">&#10095;</span>
    </div>
</div>
<script>
    let aktualnyIndeks = 0;
    const wszystkieZdjecia = Array.from(document.querySelectorAll('.foto-item img'));
    const modal = document.getElementById("mojModal");
    const imgFull = document.getElementById("imgFull");

    function otworzModal(src) {
        modal.style.display = "flex";
        imgFull.src = src;
        aktualnyIndeks = wszystkieZdjecia.findIndex(img => img.src === src);
    }

    function zamknijModal() {
        modal.style.display = "none";
    }

    function zmienZdjecie(kierunek) {
        aktualnyIndeks += kierunek;
        if (aktualnyIndeks >= wszystkieZdjecia.length) aktualnyIndeks = 0;
        if (aktualnyIndeks < 0) aktualnyIndeks = wszystkieZdjecia.length - 1;
        imgFull.src = wszystkieZdjecia[aktualnyIndeks].src;
    }

    // Zamykanie tła i obsługa klawiatury
    modal.addEventListener('click', function(e) {
        if (e.target === modal || e.target.className === 'nawigacja-kontener') zamknijModal();
    });

    document.addEventListener('keydown', function(e) {
        if (modal.style.display === "flex") {
            if (e.key === "ArrowRight") zmienZdjecie(1);
            if (e.key === "ArrowLeft") zmienZdjecie(-1);
            if (e.key === "Escape") zamknijModal();
        }
    });
</script>
